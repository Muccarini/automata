services:
  db:
    image: postgres:16-alpine
    container_name: automata-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: automata
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d automata"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    image: automata-backend:local
    container_name: automata-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: postgres://postgres:postgres@db:5432/automata
      JWT_SECRET: dev-secret-change-me
      ACCESS_TOKEN_TTL_SECONDS: 900
      REFRESH_TOKEN_TTL_SECONDS: 1209600
    ports:
      - "3000:3000"

volumes:
  postgres_data:
